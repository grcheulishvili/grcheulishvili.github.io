{{ define "main" }}
<div class="wrap section-pad untranslated">
  <div class="hero-term" aria-hidden="true">
    <span class="l"><span class="pfx">~/G.R</span><span class="cmd" id="ut-cmd">{{ i18n "untranslated_cmd" }}</span></span>
    <span class="l ut-err" id="ut-err">{{ i18n "untranslated_err" }}</span>
  </div>
  <h1>{{ i18n "untranslated_title" }}</h1>
  <p class="ut-body">{{ i18n "untranslated_body" | safeHTML }}</p>
  <div class="hero-cta">
    <a class="btn btn-primary" id="ut-cta" href="#" style="display:none">{{ i18n "untranslated_cta" }} →</a>
    <a class="btn" href="{{ "" | relLangURL }}">{{ i18n "untranslated_home" }}</a>
  </div>
</div>
<script>
(function () {
  var p = new URLSearchParams(location.search);
  var from = p.get("from"), t = p.get("t");
  if (from) { var c = document.getElementById("ut-cta"); c.setAttribute("href", from); c.style.display = ""; }
  if (t) {
    var cmd = document.getElementById("ut-cmd");
    cmd.textContent = 'cat "' + t.replace(/"/g, "") + '"';
  }
})();
</script>
{{ end }}
